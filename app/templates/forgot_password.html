{% extends "base.html" %}
{% block content %}
<div class="auth-card">
  <h2>Reset Password</h2>
  <form method="POST">
    <input type="email" name="email" placeholder="Enter your registered email" required>
    <button type="submit">Reset Password</button>
  </form>
  <p><a href="{{ url_for('main.login') }}">Back to Login</a></p>
</div>
{% endblock %}
