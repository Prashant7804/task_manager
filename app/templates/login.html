{% extends "base.html" %}
{% block content %}
<div class="auth-card">
  <h2>Login</h2>
  <form method="POST">
    <input type="email" name="email" placeholder="Email" required>
    <div class="password-wrap">
      <input type="password" name="password" id="login-pw" placeholder="Password" required>
      <span class="eye-toggle" onclick="togglePw('login-pw', this)">👁</span>
    </div>
    <button type="submit">Login</button>
  </form>
  <p><a href="{{ url_for('main.forgot_password') }}">Forgot password?</a></p>
  <p>No account? <a href="{{ url_for('main.register') }}">Register</a></p>
</div>
{% endblock %}
