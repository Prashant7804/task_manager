{% extends "base.html" %}
{% block content %}
<div class="auth-card">
  <h2>Set New Password</h2>
  <form method="POST">
    <div class="password-wrap">
      <input type="password" name="password" id="new-pw" placeholder="New password" required>
      <span class="eye-toggle" onclick="togglePw('new-pw', this)">👁</span>
    </div>
    <div class="password-wrap">
      <input type="password" name="confirm_password" id="confirm-pw" placeholder="Confirm new password" required>
      <span class="eye-toggle" onclick="togglePw('confirm-pw', this)">👁</span>
    </div>
    <button type="submit">Update Password</button>
  </form>
</div>
{% endblock %}
